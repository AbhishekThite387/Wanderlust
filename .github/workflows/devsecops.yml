name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  devsecops:
    name: DevSecOps Pipeline
    runs-on: ubuntu-latest

    steps:
      # ==========================
      # Checkout Repository
      # ==========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================
      # Setup Java
      # ==========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ==========================
      # Setup Node.js
      # ==========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ==========================
      # Install Dependencies
      # ==========================
      - name: Install Dependencies
        run: npm ci

      # ==========================
      # SonarQube Scan
      # ==========================
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ==========================
      # Install jq
      # ==========================
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ==========================
      # Wait for SonarQube Analysis
      # ==========================
      - name: Wait for SonarQube Analysis
        run: sleep 15

      # ==========================
      # Check SonarQube Quality Gate
      # ==========================
      - name: Check SonarQube Quality Gate
        run: |
          PROJECT_KEY=wanderlust

          STATUS=$(curl -s \
            -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?projectKey=$PROJECT_KEY" \
            | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate Failed!"
            exit 1
          fi

          echo "Quality Gate Passed!"

      # ==========================================
      # Download OWASP Dependency Check
      # ==========================================
      - name: Download OWASP Dependency Check
        run: |
          wget https://github.com/dependency-check/DependencyCheck/releases/download/v12.0.2/dependency-check-12.0.2-release.zip
          unzip dependency-check-12.0.2-release.zip
          rm dependency-check-12.0.2-release.zip

      # ==========================
      # Create Reports Directory
      # ==========================
      - name: Create Reports Directory
        run: mkdir -p reports

      # ==========================
      # Run OWASP Dependency Check
      # ==========================
      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x dependency-check/bin/dependency-check.sh

          dependency-check/bin/dependency-check.sh \
          --project "WanderLust" \
          --scan . \
          --format HTML \
          --out reports \
          --enableRetired \
          --enableExperimental \
            --nvdApiKey "$NVD_API_KEY"

      # ==========================================
      # Upload OWASP Report
      # ==========================================
      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OWASP-Dependency-Check-Report
          path: reports/
