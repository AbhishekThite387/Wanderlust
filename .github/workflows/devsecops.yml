name: DevSecOps Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  devsecops:
    name: DevSecOps Pipeline
    runs-on: ubuntu-latest

    steps:
      # ==========================
      # Checkout Repository
      # ==========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================
      # Setup Java
      # ==========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ==========================
      # Setup Node.js
      # ==========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ==========================
      # Install Dependencies
      # ==========================
      - name: Install Dependencies
        run: npm ci

      # ==========================
      # SonarQube Scan
      # ==========================
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ==========================
      # Install jq
      # ==========================
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ==========================
      # Wait for SonarQube Analysis
      # ==========================
      - name: Wait for SonarQube Analysis
        run: sleep 15

      # ==========================
      # Check SonarQube Quality Gate
      # ==========================
      - name: Check SonarQube Quality Gate
        run: |
          PROJECT_KEY=wanderlust

          STATUS=$(curl -s \
            -u "${{ secrets.SONAR_TOKEN }}:" \
            "${{ secrets.SONAR_HOST_URL }}/api/qualitygates/project_status?projectKey=$PROJECT_KEY" \
            | jq -r '.projectStatus.status')

          echo "Quality Gate Status: $STATUS"

          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate Failed!"
            exit 1
          fi

          echo "Quality Gate Passed!"

        # ==========================================
        # Install Trivy
        # ==========================================
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | \
          sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      # ==========================================
      # Trivy Filesystem Scan
      # ==========================================
      - name: Trivy Filesystem Scan
        run: |
          mkdir -p trivy-reports

          trivy fs \
          --severity HIGH,CRITICAL \
          --format table \
          --output trivy-reports/filesystem-report.txt \
          .

      # ==========================================
      # Build Docker Image
      # ==========================================
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/wanderlust:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/wanderlust:latest \
          .

      # ==========================================
      # Trivy Docker Image Scan
      # ==========================================
      - name: Trivy Image Scan
        run: |
          trivy image \
          --severity HIGH,CRITICAL \
          --format table \
          --output trivy-reports/image-report.txt \
          ${{ secrets.DOCKER_USERNAME }}/wanderlust:${{ github.sha }}

      # ==========================================
      # Login to Docker Hub
      # ==========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      # ==========================================
      # Push Docker Image
      # ==========================================
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/wanderlust:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/wanderlust:${{ github.sha }}

      # ==========================================
      # Upload Trivy Reports
      # ==========================================

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: Trivy-Reports
          path: trivy-reports/

      - name: Update Helm Image Tag
        run: |
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' helm/wanderlust/values.yaml


      - name: Commit Helm Image Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/wanderlust/values.yaml
          git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
          git push