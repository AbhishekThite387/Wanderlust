{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: wanderlust-secret
type: Opaque
stringData:
  ATLASDB_URL: {{ .Values.secret.atlasDbUrl | quote }}
  SECRET: {{ .Values.secret.sessionSecret | quote }}
  CLOUD_API_KEY: {{ .Values.secret.cloudApiKey | quote }}
  CLOUD_API_SECRET: {{ .Values.secret.cloudApiSecret | quote }}
{{- end }}