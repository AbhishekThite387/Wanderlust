apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wanderlust.fullname" . }}
  labels:
    {{- include "wanderlust.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "wanderlust.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wanderlust.labels" . | nindent 8 }}
    spec:

      serviceAccountName: {{ include "wanderlust.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP

          envFrom:
            - configMapRef:
                name: wanderlust-config

            - secretRef:
                name: wanderlust-secret
                
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

